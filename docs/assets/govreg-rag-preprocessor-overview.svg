<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">공공규정 MCP 빌더 운영 흐름</title>
  <desc id="desc">규정 파일을 업로드하고 전처리, 사람 검토와 승인, 승인된 규정 DB, MCP 서버, 기관 AI 조회로 이어지는 흐름</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ec; }
      .header { fill: #183c34; }
      .panel { fill: #ffffff; stroke: #d6c9aa; stroke-width: 2; }
      .panelSoft { fill: #fff7df; stroke: #e0b650; stroke-width: 2; }
      .panelGreen { fill: #edf6f1; stroke: #85aa9b; stroke-width: 2; }
      .title { font: 700 42px "Malgun Gothic", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; fill: #fffaf0; }
      .subtitle { font: 500 20px "Malgun Gothic", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; fill: #f7e6b2; }
      .h2 { font: 700 25px "Malgun Gothic", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; fill: #183c34; }
      .body { font: 500 18px "Malgun Gothic", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; fill: #21342f; }
      .small { font: 500 15px "Malgun Gothic", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; fill: #5f615b; }
      .badge { fill: #287765; }
      .badgeText { font: 700 18px "Malgun Gothic", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif; fill: white; }
      .arrow { stroke: #287765; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#287765" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720" />
  <rect class="header" x="40" y="36" width="1200" height="120" />
  <text class="title" x="78" y="88">공공규정 MCP 빌더</text>
  <text class="subtitle" x="80" y="126">PDF, HWP, HWPX, DOCX 규정을 검수 가능한 로컬 DB와 MCP 서버로 바꿉니다.</text>
  <rect class="panelSoft" x="70" y="200" width="300" height="400" rx="22" />
  <text class="h2" x="102" y="246">운영자가 하는 일</text>
  <circle class="badge" cx="120" cy="292" r="22" />
  <text class="badgeText" x="114" y="299">1</text>
  <text class="body" x="158" y="290">규정 파일 업로드</text>
  <text class="small" x="158" y="316">여러 파일을 드래그 앤 드롭</text>
  <circle class="badge" cx="120" cy="372" r="22" />
  <text class="badgeText" x="114" y="379">2</text>
  <text class="body" x="158" y="370">전처리 실행</text>
  <text class="small" x="158" y="396">조문, 표, 별표 후보 추출</text>
  <circle class="badge" cx="120" cy="452" r="22" />
  <text class="badgeText" x="114" y="459">3</text>
  <text class="body" x="158" y="450">사람 검토</text>
  <text class="small" x="158" y="476">애매한 부분만 확인</text>
  <circle class="badge" cx="120" cy="532" r="22" />
  <text class="badgeText" x="114" y="539">4</text>
  <text class="body" x="158" y="530">승인 후 연결</text>
  <text class="small" x="158" y="556">승인된 근거만 MCP로 제공</text>
  <rect class="panel" x="430" y="200" width="780" height="400" rx="22" />
  <text class="h2" x="470" y="246">프로그램 내부 흐름</text>
  <rect class="panelGreen" x="470" y="285" width="190" height="92" rx="16" />
  <text class="body" x="500" y="323">원본 규정</text>
  <text class="small" x="500" y="350">PDF/HWP/HWPX</text>
  <path class="arrow" d="M670 331 H745" />
  <rect class="panelGreen" x="760" y="285" width="190" height="92" rx="16" />
  <text class="body" x="790" y="323">전처리</text>
  <text class="small" x="790" y="350">조문, 표, 별표 정리</text>
  <path class="arrow" d="M960 331 H1035" />
  <rect class="panelSoft" x="1050" y="285" width="120" height="92" rx="16" />
  <text class="body" x="1076" y="323">검수</text>
  <text class="small" x="1075" y="350">사람 승인</text>
  <rect class="panelGreen" x="470" y="430" width="210" height="92" rx="16" />
  <text class="body" x="500" y="468">승인된 규정 DB</text>
  <text class="small" x="500" y="495">감사 이력 보관</text>
  <path class="arrow" d="M690 476 H765" />
  <rect class="panelGreen" x="780" y="430" width="170" height="92" rx="16" />
  <text class="body" x="815" y="468">MCP 서버</text>
  <text class="small" x="810" y="495">search, fetch</text>
  <path class="arrow" d="M960 476 H1035" />
  <rect class="panelSoft" x="1050" y="430" width="120" height="92" rx="16" />
  <text class="body" x="1078" y="468">기관 AI</text>
  <text class="small" x="1072" y="495">근거 조회</text>
  <text class="small" x="470" y="565">Kordoc은 표 구조 추출에 사용합니다. 단, 사람 승인 전에는 공식 답변 근거로 확정하지 않습니다.</text>
</svg>
