services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      API_AUTH_REQUIRED: ${API_AUTH_REQUIRED:-true}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
      API_AUTH_TOKENS: ${API_AUTH_TOKENS:-}
      TENANT_STORAGE_ISOLATION: ${TENANT_STORAGE_ISOLATION:-true}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  streamlit:
    profiles:
      - local-ui
    build: .
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      APP_ENV: ${STREAMLIT_APP_ENV:-local}
      API_AUTH_REQUIRED: ${STREAMLIT_API_AUTH_REQUIRED:-false}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
      API_AUTH_TOKENS: ${API_AUTH_TOKENS:-}
      TENANT_STORAGE_ISOLATION: ${STREAMLIT_TENANT_STORAGE_ISOLATION:-false}

